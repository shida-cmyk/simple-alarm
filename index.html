<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Alarm</title>
  <style>
    :root {
      --bg: #0f1220;
      --card: #1a1f35;
      --accent: #6c8cff;
      --accent-2: #ff6c8c;
      --text: #f2f4ff;
      --muted: #8b91b4;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .app { width: 100%; max-width: 380px; padding: 32px 24px; text-align: center; }
    .logo { font-size: 1.4rem; font-weight: 600; color: var(--muted); margin-bottom: 16px; }
    .clock {
      font-size: 3.2rem; font-weight: 700; letter-spacing: 2px;
      font-variant-numeric: tabular-nums; margin-bottom: 28px;
    }
    .setter { display: flex; gap: 8px; margin-bottom: 24px; }
    .time-picker {
      flex: 1; display: flex; align-items: center; gap: 6px;
      background: var(--card); border-radius: 12px; padding: 4px 10px;
    }
    .time-picker select {
      flex: 1; font-size: 1.3rem; font-variant-numeric: tabular-nums;
      text-align: center; padding: 10px 6px; border: none; border-radius: 8px;
      background: var(--card); color: var(--text); cursor: pointer;
    }
    .time-picker select:focus { outline: none; }
    .time-picker .colon { font-size: 1.3rem; font-weight: 700; color: var(--muted); }
    .btn {
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.05s ease, opacity 0.2s ease;
    }
    .btn:active { transform: scale(0.96); }
    .btn-primary { padding: 12px 18px; background: var(--accent); color: #fff; }
    .alarm-list { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .alarm-item {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: 14px; padding: 14px 18px;
    }
    .alarm-item .time {
      font-size: 1.5rem; font-weight: 600; font-variant-numeric: tabular-nums;
    }
    .alarm-item.done .time { opacity: 0.4; text-decoration: line-through; }
    .delete-btn {
      background: none; border: none; color: var(--muted);
      font-size: 1.3rem; cursor: pointer; line-height: 1;
    }
    .delete-btn:hover { color: var(--accent-2); }
    .ringing-overlay {
      position: fixed; inset: 0; background: rgba(15, 18, 32, 0.85);
      display: flex; align-items: center; justify-content: center; backdrop-filter: blur(6px);
    }
    .ringing-card {
      background: var(--card); border-radius: 24px; padding: 40px 48px;
      text-align: center; animation: pulse 1s ease-in-out infinite;
    }
    .ringing-time { font-size: 3rem; font-weight: 700; }
    .ringing-text { color: var(--muted); margin: 8px 0 24px; }
    .btn-stop { padding: 14px 40px; background: var(--accent-2); color: #fff; font-size: 1.1rem; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }
  </style>
</head>
<body>
  <main class="app">
    <h1 class="logo">⏰ Alarm</h1>

    <div class="clock" id="clock">--:--:--</div>

    <form class="setter" id="setter">
      <div class="time-picker">
        <select id="hour-input" aria-label="時"></select>
        <span class="colon">:</span>
        <select id="minute-input" aria-label="分"></select>
      </div>
      <button type="submit" class="btn btn-primary">セット</button>
    </form>

    <ul class="alarm-list" id="alarm-list"></ul>
  </main>

  <div class="ringing-overlay" id="ringing" hidden>
    <div class="ringing-card">
      <p class="ringing-time" id="ringing-time">--:--</p>
      <p class="ringing-text">時間です！</p>
      <button class="btn btn-stop" id="stop-btn">停止</button>
    </div>
  </div>

  <script>
    const STORAGE_KEY = "simple-alarm:alarms";
    let alarms = loadAlarms();

    const clockEl = document.getElementById("clock");
    const listEl = document.getElementById("alarm-list");
    const formEl = document.getElementById("setter");
    const hourInput = document.getElementById("hour-input");
    const minuteInput = document.getElementById("minute-input");
    const ringingEl = document.getElementById("ringing");
    const ringingTimeEl = document.getElementById("ringing-time");
    const stopBtn = document.getElementById("stop-btn");

    let audioCtx = null;
    let ringTimer = null;

    function buildTimeOptions() {
      for (let h = 0; h < 24; h++) {
        const opt = document.createElement("option");
        opt.value = String(h).padStart(2, "0");
        opt.textContent = String(h).padStart(2, "0");
        hourInput.append(opt);
      }
      for (let m = 0; m < 60; m++) {
        const opt = document.createElement("option");
        opt.value = String(m).padStart(2, "0");
        opt.textContent = String(m).padStart(2, "0");
        minuteInput.append(opt);
      }
      const now = new Date();
      hourInput.value = String(now.getHours()).padStart(2, "0");
      minuteInput.value = String(now.getMinutes()).padStart(2, "0");
    }

    function loadAlarms() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch {
        return [];
      }
    }

    function saveAlarms() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(alarms)); } catch {}
    }

    function render() {
      listEl.innerHTML = "";
      alarms
        .slice()
        .sort((a, b) => a.time.localeCompare(b.time))
        .forEach((alarm) => {
          const li = document.createElement("li");
          li.className = "alarm-item" + (alarm.triggered ? " done" : "");
          const time = document.createElement("span");
          time.className = "time";
          time.textContent = alarm.time;
          const del = document.createElement("button");
          del.className = "delete-btn";
          del.setAttribute("aria-label", "削除");
          del.textContent = "×";
          del.addEventListener("click", () => removeAlarm(alarm.id));
          li.append(time, del);
          listEl.append(li);
        });
    }

    function addAlarm(time) {
      if (alarms.some((a) => a.time === time && !a.triggered)) return;
      alarms.push({ id: Date.now(), time, triggered: false });
      saveAlarms();
      render();
    }

    function removeAlarm(id) {
      alarms = alarms.filter((a) => a.id !== id);
      saveAlarms();
      render();
    }

    function tick() {
      const now = new Date();
      const hh = String(now.getHours()).padStart(2, "0");
      const mm = String(now.getMinutes()).padStart(2, "0");
      const ss = String(now.getSeconds()).padStart(2, "0");
      clockEl.textContent = `${hh}:${mm}:${ss}`;
      const current = `${hh}:${mm}`;
      alarms.forEach((alarm) => {
        if (!alarm.triggered && alarm.time === current && ss === "00") {
          alarm.triggered = true;
          saveAlarms();
          render();
          trigger(alarm.time);
        }
      });
    }

    function trigger(time) {
      ringingTimeEl.textContent = time;
      ringingEl.hidden = false;
      startBeep();
    }

    function startBeep() {
      stopBeep();
      const Ctx = window.AudioContext || window.webkitAudioContext;
      if (!Ctx) return;
      audioCtx = new Ctx();
      const beep = () => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.value = 880;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.0001, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.3, audioCtx.currentTime + 0.05);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      };
      beep();
      ringTimer = setInterval(beep, 800);
    }

    function stopBeep() {
      if (ringTimer) clearInterval(ringTimer);
      ringTimer = null;
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
    }

    function stopRinging() {
      ringingEl.hidden = true;
      stopBeep();
    }

    formEl.addEventListener("submit", (e) => {
      e.preventDefault();
      addAlarm(`${hourInput.value}:${minuteInput.value}`);
    });

    stopBtn.addEventListener("click", stopRinging);

    buildTimeOptions();
    render();
    tick();
    setInterval(tick, 1000);
  </script>
</body>
</html>
